name: update-flakes

# Weekly refresh of the nix-claude-code flake input, committed back to main.
# Other inputs are left alone and bumped by hand.

on:
  schedule:
    # Mondays 04:17 UTC
    - cron: "17 4 * * 1"
  workflow_dispatch:

jobs:
  update-flakes:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@main

      - name: Update nix-claude-code
        run: nix flake update nix-claude-code

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet flake.lock; then
            echo "flake.lock unchanged, nothing to commit."
            exit 0
          fi
          git add flake.lock
          git commit -m "flake.lock: weekly nix-claude-code update"
          git push
